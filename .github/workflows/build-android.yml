name: Bouw Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Node installeren
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Afhankelijkheden installeren
        run: npm ci

      - name: Model + bibliotheken downloaden (offline meebundelen)
        run: |
          node - <<'NODE'
          const fs=require('fs'), path=require('path');
          async function get(url){
            const r=await fetch(url,{redirect:'follow'});
            if(!r.ok) throw new Error('HTTP '+r.status+' bij '+url);
            return Buffer.from(await r.arrayBuffer());
          }
          async function saveFile(url,dest){
            const b=await get(url);
            fs.mkdirSync(path.dirname(dest),{recursive:true});
            fs.writeFileSync(dest,b);
            console.log('OK',dest,'('+b.length+' bytes)');
          }
          async function saveModel(candidates,dir){
            fs.mkdirSync(dir,{recursive:true});
            let ok=false, lastErr;
            for(const c of candidates){
              try{
                const mjBuf=await get(c.base+'model.json'+(c.q||''));
                const mj=JSON.parse(mjBuf.toString());
                fs.writeFileSync(path.join(dir,'model.json'),JSON.stringify(mj));
                console.log('OK',path.join(dir,'model.json'),'via',c.base);
                const shards=new Set();
                (mj.weightsManifest||[]).forEach(g=>(g.paths||[]).forEach(p=>shards.add(p)));
                for(const s of shards){ await saveFile(c.base+s+(c.q||''), path.join(dir,s)); }
                ok=true; break;
              }catch(e){ console.log('mislukt via',c.base,'-',e.message); lastErr=e; }
            }
            if(!ok) throw lastErr;
          }
          (async()=>{
            await saveFile('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js','www/vendor/tf.min.js');
            await saveFile('https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js','www/vendor/coco-ssd.min.js');
            await saveFile('https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js','www/vendor/mobilenet.min.js');
            await saveModel([
              {base:'https://storage.googleapis.com/tfjs-models/savedmodel/ssdlite_mobilenet_v2/'},
              {base:'https://storage.googleapis.com/tfjs-models/savedmodel/ssd_mobilenet_v2/'}
            ],'www/models/coco-ssd');
            await saveModel([
              {base:'https://storage.googleapis.com/tfhub-tfjs-modules/google/imagenet/mobilenet_v2_100_224/classification/2/'},
              {base:'https://tfhub.dev/google/imagenet/mobilenet_v2_100_224/classification/2/', q:'?tfjs-format=file'}
            ],'www/models/mobilenet');
            console.log('Klaar: alle bibliotheken en modellen opgehaald.');
          })().catch(e=>{ console.error('FOUT:',e.message); process.exit(1); });
          NODE
          echo "== gedownloade modelbestanden =="
          ls -la www/models/coco-ssd www/models/mobilenet www/vendor

      - name: Android-platform toevoegen
        run: npx cap add android

      - name: Web-assets forceren (model + bibliotheken echt in de app)
        run: |
          ASSETS=android/app/src/main/assets/public
          mkdir -p "$ASSETS/models" "$ASSETS/vendor"
          cp -r www/models/. "$ASSETS/models/"
          cp -r www/vendor/. "$ASSETS/vendor/"
          echo "== gebundelde coco-bestanden in de APK =="
          ls -la "$ASSETS/models/coco-ssd/"
          echo "== gebundelde mobilenet-bestanden in de APK =="
          ls -la "$ASSETS/models/mobilenet/"

      - name: Permissies in manifest zetten
        run: node scripts/patch-android.js

      - name: Java (JDK 17) installeren
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK klaarzetten
        uses: android-actions/setup-android@v3

      - name: Benodigde SDK-onderdelen installeren
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: APK bouwen (debug)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: APK als download klaarzetten
        uses: actions/upload-artifact@v4
        with:
          name: camera-wekker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
